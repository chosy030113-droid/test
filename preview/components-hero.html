<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-ui); background: var(--surface-pure); }
  .wrap { padding: 22px 24px; }
  .card { background: var(--blue-600); border-radius: var(--r-lg); padding: 20px; box-shadow: var(--shadow-card); }
  .title { font-size: 18px; font-weight: 500; color: var(--surface); }
  .title .y { color: var(--accent-yellow); font-weight: 700; }
  .track { height: 10px; border-radius: 9999px; background: var(--blue-500); margin: 14px 0 12px; overflow: hidden; }
  .fill { height: 100%; width: 40%; background: var(--accent-green); border-radius: 9999px; }
  .desc { font-size: 14px; line-height: 22.75px; color: var(--blue-400); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">레벨 2 · <span class="y">전화 배달 주문하기</span></div>
      <div class="track"><div class="fill"></div></div>
      <div class="desc">기본적인 비즈니스 매너와 간단한 용건을 전달하고<br>메뉴를 주문하는 실전 연습입니다.</div>
    </div>
  </div>
</body>
</html>
