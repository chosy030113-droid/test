<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-ui); background: var(--bg); }
  .wrap { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px 20px; align-items: start; }
  .field { height: 40px; padding: 0 26px; border-radius: 8px; background: var(--surface); border: 1px solid var(--blue-400); color: var(--blue-500); font-size: 16px; display: inline-flex; align-items: center; }
  .note { display: flex; align-items: center; gap: 12px; padding: 16px; border-radius: 8px; background: var(--surface); border: 1px solid var(--blue-400); }
  .note span { font-size: 14px; line-height: 20px; color: var(--blue-500); }
  .ic { width: 16px; height: 16px; color: var(--blue-500); flex-shrink: 0; }
  .cta { height: 56px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: #fff; }
  .on  { background: var(--blue-600); box-shadow: var(--shadow-card); }
  .off { background: var(--ink-400); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="field">오후 8:00</div>
    <div class="note"><i data-lucide="info" class="ic"></i><span>마이페이지에서 언제든 변경할 수 있어요</span></div>
    <div class="cta on">다음</div>
    <div class="cta off">다음</div>
  </div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
