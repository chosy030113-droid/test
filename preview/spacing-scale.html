<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-ui); background: var(--surface-pure); }
  .wrap { padding: 22px 24px; display: flex; gap: 16px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 9px; }
  .box { background: var(--blue-300); border-radius: 4px; }
  .nm { font-size: 11px; font-weight: 700; color: var(--ink-700); }
  .px { font-family: var(--font-num); font-size: 10px; color: var(--ink-400); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="box" style="width:4px;height:4px"></div><div class="nm">1</div><div class="px">4px</div></div>
    <div class="item"><div class="box" style="width:8px;height:8px"></div><div class="nm">2</div><div class="px">8px</div></div>
    <div class="item"><div class="box" style="width:12px;height:12px"></div><div class="nm">3</div><div class="px">12px</div></div>
    <div class="item"><div class="box" style="width:16px;height:16px"></div><div class="nm">4</div><div class="px">16px</div></div>
    <div class="item"><div class="box" style="width:20px;height:20px"></div><div class="nm">5</div><div class="px">20px</div></div>
    <div class="item"><div class="box" style="width:24px;height:24px"></div><div class="nm">6</div><div class="px">24px</div></div>
    <div class="item"><div class="box" style="width:32px;height:32px"></div><div class="nm">8</div><div class="px">32px</div></div>
  </div>
</body>
</html>
