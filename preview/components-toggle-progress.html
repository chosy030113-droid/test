<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-ui); background: var(--surface-pure); }
  .wrap { padding: 24px; display: flex; flex-direction: column; gap: 22px; }
  .row { display: flex; align-items: center; gap: 18px; }
  .toggle { width: 56px; height: 32px; border-radius: 9999px; display: flex; align-items: center; padding: 3px; box-sizing: border-box; }
  .on  { background: var(--blue-600); justify-content: flex-end; }
  .off { background: var(--line-300); justify-content: flex-start; }
  .knob { width: 26px; height: 26px; border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.2); }
  .tag { font-size: 13px; color: var(--ink-400); }
  /* progress */
  .prog { display: flex; align-items: center; gap: 16px; }
  .track { flex: 1; height: 6px; border-radius: 9999px; background: var(--blue-200); overflow: hidden; }
  .fill { height: 100%; border-radius: 9999px; background: var(--blue-600); }
  .step { font-size: 14px; color: var(--blue-500); letter-spacing: -.02em; }
  .divider { height: 1px; background: var(--line-100); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><div class="toggle on"><span class="knob"></span></div><span class="tag">ON · var(--blue-600)</span><div class="toggle off"><span class="knob"></span></div><span class="tag">OFF · var(--line-300)</span></div>
    <div class="divider"></div>
    <div class="prog"><div class="track"><div class="fill" style="width:33%"></div></div><span class="step">1/3</span></div>
    <div class="prog"><div class="track"><div class="fill" style="width:66%"></div></div><span class="step">2/3</span></div>
    <div class="prog"><div class="track"><div class="fill" style="width:100%"></div></div><span class="step">3/3</span></div>
  </div>
</body>
</html>
