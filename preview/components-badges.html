<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-ui); background: var(--surface-pure); }
  .wrap { padding: 24px; display: flex; flex-direction: column; gap: 22px; }
  .group { display: flex; align-items: center; gap: 12px; }
  .glabel { font-size: 11px; color: var(--ink-400); width: 96px; }
  .badge { font-size: 10px; color: var(--blue-500); border: 1px solid var(--blue-300); border-radius: var(--r-xs); padding: 4px 8px; line-height: 15px; }
  .pill { font-size: 11px; border-radius: 9999px; padding: 4px 11px; font-weight: 700; }
  .p-done { background: rgba(60,112,255,.10); color: var(--blue-600); }
  .p-prog { background: var(--blue-600); color: var(--accent-yellow); }
  .p-lock { background: #eef0f4; color: var(--ink-400); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="group"><span class="glabel">Difficulty badge</span><span class="badge">초급</span><span class="badge">중급</span><span class="badge">고급</span></div>
    <div class="group"><span class="glabel">Status pill</span><span class="pill p-done">완료됨</span><span class="pill p-prog">진행 중</span><span class="pill p-lock">잠김</span></div>
  </div>
</body>
</html>
