<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-ui); background: var(--surface-pure); }
  .wrap { padding: 18px 24px; }
  .spec { display: grid; grid-template-columns: 1fr auto; align-items: baseline; gap: 6px 16px; padding: 9px 0; border-bottom: 1px solid #f0f1f4; }
  .spec:last-child { border-bottom: none; }
  .lab { text-align: right; font-family: var(--font-num); font-size: 10.5px; color: var(--ink-400); letter-spacing: 0; white-space: nowrap; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="spec"><div class="ds-section" style="color:var(--ink-900)">레벨 로드맵</div><div class="lab">Section · 18 / 28 · Regular</div></div>
    <div class="spec"><div class="ds-heading" style="color:var(--blue-600)">레벨 2 · 전화 배달 주문하기</div><div class="lab">Heading · 18 / 28 · Medium</div></div>
    <div class="spec"><div class="ds-title">난이도 선택</div><div class="lab">Title · 16 / 24 · Bold</div></div>
    <div class="spec"><div class="ds-body">배달 문의</div><div class="lab">Body · 16 / 24 · Regular</div></div>
    <div class="spec"><div class="ds-sub">기본적인 비즈니스 매너를 전달하는 실전 연습입니다.</div><div class="lab">Sub · 14 / 22.75 · Regular</div></div>
    <div class="spec"><div class="ds-meta">짧고 간단한 통화</div><div class="lab">Meta · 12 / 16 · Regular</div></div>
    <div class="spec"><div class="ds-caption" style="color:var(--blue-500)">초급</div><div class="lab">Caption · 10 / 15 · Regular</div></div>
  </div>
</body>
</html>
