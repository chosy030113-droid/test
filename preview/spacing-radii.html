<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-ui); background: var(--surface-pure); }
  .wrap { padding: 22px 24px; display: flex; gap: 16px; }
  .item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 100%; height: 58px; background: var(--surface); border: 1px solid var(--blue-300); }
  .nm { font-size: 11px; font-weight: 700; color: var(--ink-700); }
  .px { font-family: var(--font-num); font-size: 10px; color: var(--ink-400); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="nm">xs · badge</div><div class="px">4px</div></div>
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="nm">sm · scenario row</div><div class="px">6px</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="nm">md · chip / roadmap</div><div class="px">8px</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="nm">lg · hero card</div><div class="px">12px</div></div>
    <div class="item"><div class="box" style="border-radius:9999px"></div><div class="nm">pill · bar / dots</div><div class="px">full</div></div>
  </div>
</body>
</html>
