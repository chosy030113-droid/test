<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-ui); background: var(--surface-pure); }
  .wrap { padding: 22px 24px; display: flex; gap: 20px; }
  .fam { flex: 1; border: 1px solid var(--blue-300); border-radius: 12px; padding: 16px 18px; }
  .big { font-family: var(--font-ui); font-size: 40px; font-weight: 700; color: var(--ink-700); line-height: 1; }
  .big.inter { font-family: var(--font-num); }
  .meta { margin-top: 12px; font-size: 12px; font-weight: 700; color: var(--ink-700); }
  .desc { font-size: 11px; color: var(--ink-400); margin-top: 4px; line-height: 1.4; }
  .wts { font-family: var(--font-num); font-size: 11px; color: var(--blue-500); margin-top: 8px; letter-spacing: 0; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="fam">
      <div class="big">연습하기 Ag 한</div>
      <div class="meta">Roboto</div>
      <div class="desc">Product UI typeface — every label, title and body. Korean falls back to Apple SD Gothic Neo / Malgun Gothic.</div>
      <div class="wts">Regular 400 · Medium 500 · Bold 700</div>
    </div>
    <div class="fam">
      <div class="big inter">9:41 Ag</div>
      <div class="meta">Inter</div>
      <div class="desc">Status-bar numerals only — the clock time. Tight -0.02em tracking.</div>
      <div class="wts">SemiBold 600 · Bold 700</div>
    </div>
  </div>
</body>
</html>
