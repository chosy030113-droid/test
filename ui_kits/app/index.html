<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>콜포비아 연습 앱 — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background: #e7ebf1;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 32px 0;
    font-family: var(--font-ui);
  }
  /* lightweight iPhone bezel (375 × 812 pt screen) */
  .phone {
    position: relative;
    width: 401px; height: 838px;
    background: #0b1020;
    border-radius: 54px;
    padding: 13px;
    box-shadow: 0 30px 70px -20px rgba(20,32,68,.45), inset 0 0 0 2px rgba(255,255,255,.06);
  }
  .screen-clip {
    width: 375px; height: 812px;
    border-radius: 42px; overflow: hidden;
    background: var(--bg);
    position: relative;
  }
  .home-indicator {
    position: absolute; left: 50%; bottom: 22px; transform: translateX(-50%);
    width: 134px; height: 5px; border-radius: 9999px; background: rgba(255,255,255,.85);
    z-index: 20; pointer-events: none;
  }
  /* keep lucide icons crisp */
  [data-lucide] svg { display: block; }
  *::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="onboarding.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
