<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>콜포비아 — 전화 연습 앱</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3c70ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="콜포비아">
<link rel="apple-touch-icon" href="icons/icon-192.svg">

<!-- OG -->
<meta property="og:title" content="콜포비아 — 전화 연습 앱">
<meta property="og:description" content="전화 공포증 극복을 위한 단계별 연습 앱">
<meta property="og:type" content="website">

<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background: #e7ebf1;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 32px 0;
    font-family: var(--font-ui);
  }
  .phone {
    position: relative;
    width: 375px; height: 812px;
    background: #0b1020;
    border-radius: 42px;
    padding: 0;
    box-shadow: 0 30px 70px -20px rgba(20,32,68,.45);
  }
  .screen-clip {
    width: 100%; height: 100%;
    border-radius: 42px; overflow: hidden;
    background: var(--bg);
    position: relative;
  }
  .home-indicator {
    position: absolute; left: 50%; bottom: 22px; transform: translateX(-50%);
    width: 134px; height: 5px; border-radius: 9999px; background: rgba(255,255,255,.85);
    z-index: 20; pointer-events: none;
  }
  [data-lucide] svg { display: block; }
  *::-webkit-scrollbar { width: 0; height: 0; }

  /* 모바일: 폰 베젤 숨기고 전체화면 */
  @media (max-width: 420px) {
    body { background: var(--bg); padding: 0; align-items: flex-start; }
    .phone {
      width: 100vw; height: 100dvh;
      border-radius: 0; padding: 0;
      background: transparent;
      box-shadow: none;
    }
    .screen-clip {
      width: 100%; height: 100%;
      border-radius: 0;
    }
    .home-indicator { display: none; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <script type="text/babel" src="ui_kits/app/components.jsx"></script>
  <script type="text/babel" src="ui_kits/app/onboarding.jsx"></script>
  <script type="text/babel" src="ui_kits/app/screens.jsx"></script>
  <script type="text/babel" src="ui_kits/app/app.jsx"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/test/sw.js');
      });
    }
  </script>
</body>
</html>
